<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>jgfx — amalgamated build smoke test</title>
  <style>
    html, body { margin: 0; height: 100%; background: #14141c; color: #e6e6ef;
      font: 14px/1.5 system-ui, sans-serif; }
    #wrap { display: grid; grid-template-rows: auto 1fr; height: 100%; }
    header { padding: .8rem 1rem; border-bottom: 1px solid #2c2c3c; }
    header h1 { margin: 0 0 .3rem; font-size: 1rem; }
    header h1 .accent { color: #cc66ff; }
    #status span { display: inline-block; margin-right: 1.2rem; }
    .pass { color: #4ade80; } .fail { color: #ffb4b4; }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="wrap">
    <header>
      <h1><span class="accent">jgfx</span> — amalgamated build smoke test</h1>
      <div id="status">Checking…</div>
    </header>
    <!-- Triangle is drawn by the ESM bundle; a purple triangle = ESM path works. -->
    <canvas id="gfx"></canvas>
  </div>

  <!-- IIFE global build: must define window.Jgfx as a side effect. -->
  <script src="./jgfx.global.js"></script>

  <!-- ESM bundle: import straight from the single amalgamated file. -->
  <script type="module">
    import { Context, math } from "./jgfx.js";

    const status = document.getElementById("status");
    const rows = [];
    const add = (ok, label) =>
      rows.push(`<span class="${ok ? "pass" : "fail"}">${ok ? "✓" : "✗"} ${label}</span>`);

    // 1) Global (IIFE) build loaded and populated window.Jgfx.
    const g = globalThis.Jgfx;
    add(!!g && typeof g.Context === "function", "global window.Jgfx");
    add(!!g && typeof g.math?.radians === "function", "global namespaces (math)");

    // 2) ESM build: draw a triangle to prove the whole render path bundled OK.
    const wgsl = `
    @vertex fn vs_main(@builtin(vertex_index) i: u32) -> @builtin(position) vec4f {
      var p = array<vec2f, 3>(vec2f(0.0, 0.5), vec2f(-0.5, -0.5), vec2f(0.5, -0.5));
      return vec4f(p[i], 0.0, 1.0);
    }
    @fragment fn fs_main() -> @location(0) vec4f { return vec4f(0.8, 0.4, 1.0, 1.0); }`;

    try {
      const canvas = document.getElementById("gfx");
      const ctx = await Context.create({
        canvas, width: window.innerWidth, height: window.innerHeight - 70,
      });
      const shader = ctx.createShader("triangle", wgsl);
      const pipeline = ctx.createPipeline({ shader });
      add(math.radians(180).toFixed(2) === "3.14", "ESM namespace (math.radians)");

      const draw = () => {
        const frame = ctx.beginFrame([0.1, 0.1, 0.2, 1]);
        if (frame) {
          frame.pass.setPipeline(pipeline);
          frame.pass.draw(3);
          ctx.endFrame(frame);
        }
        requestAnimationFrame(draw);
      };
      requestAnimationFrame(draw);
      add(true, "ESM render path (purple triangle below)");
    } catch (e) {
      add(false, "ESM render path — " + e.message);
    }

    status.innerHTML = rows.join("");
  </script>
</body>
</html>
